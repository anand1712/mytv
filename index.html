<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Live TV Dashboard</title>
    <style>
        body { background-color: #111; color: white; font-family: sans-serif; margin: 20px; }
        h1 { text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; padding: 20px; }
        .channel-card { background: #222; padding: 10px; border-radius: 8px; text-align: center; }
        iframe { width: 100%; height: 250px; border: none; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>My Live Channels</h1>
    <div class="grid">
        <!-- Channel 1 -->
        <div class="channel-card">
            <h3>News Channel 1</h3>
            <!-- Replace CHANNEL_ID_HERE with the actual YouTube Channel ID -->
            <iframe src="https://www.youtube.com/embed/h2fvtZ2Z5lw" allowfullscreen></iframe>
        </div>

        <!-- Channel 2 -->
        <div class="channel-card">
            <h3>Space/Nature Stream</h3>
            <iframe src="https://www.youtube.com/embed/live_stream?channel=ANOTHER_CHANNEL_ID_HERE" allowfullscreen></iframe>
        </div>
    </div>

</body>
</html>
